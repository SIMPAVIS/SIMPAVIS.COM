<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPAVIS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{background:#537b9f;color:white}

header{background:#254d6b;padding:25px;text-align:center}
header h1{font-size:48px;color:#d4af37}
header p{font-size:22px;font-weight:bold;margin-top:8px}

.hero{padding:35px 20px;text-align:center}

.trip-type{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin:25px 0;
font-size:18px;
font-weight:bold;
flex-wrap:nowrap;
}

.trip-type label{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
white-space:nowrap;
}

.trip-type input{
width:auto;
margin:0;
}

.search-box{max-width:800px;margin:auto}

input{
width:100%;
padding:18px;
margin:10px 0;
border:0;
border-radius:15px;
font-size:20px;
}

label.date-label{
display:block;
text-align:left;
font-weight:bold;
margin-top:10px;
}

.travellers-box{
background:white;
color:black;
padding:18px;
border-radius:15px;
font-size:20px;
text-align:left;
margin:10px 0;
cursor:pointer;
}

.travellers-menu{
display:none;
background:white;
color:black;
padding:18px;
border-radius:15px;
text-align:left;
}

.travellers-menu label{
display:block;
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:20px;
margin-top:15px;
border:0;
border-radius:50px;
background:#d4af37;
color:black;
font-size:24px;
font-weight:bold;
}

.results{
display:none;
max-width:800px;
margin:35px auto;
padding:0 20px;
}

.result-card{
background:white;
color:black;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.result-card h3{color:#254d6b}

.result-card strong{
display:block;
color:#d4af37;
font-size:30px;
margin:12px 0;
}

.result-card a{
display:inline-block;
background:#254d6b;
color:white;
padding:12px 25px;
border-radius:25px;
text-decoration:none;
font-weight:bold;
}

footer{
background:#254d6b;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>SIMPAVIS</h1>
<p>Find Your Best Price</p>
</header>

<section class="hero">

<div class="trip-type">
<label><input type="radio" name="trip" checked onclick="toggleReturn()"> One Way</label>
<label><input type="radio" name="trip" onclick="toggleReturn()"> Round Trip</label>
<label><input type="radio" name="trip" onclick="toggleReturn()"> Multi City</label>
</div>

<div class="search-box">

<input type="text" placeholder="From">
<input type="text" placeholder="To">

<label class="date-label">Departure Date</label>
<input type="date">

<div id="returnBox">
<label class="date-label">Return Date</label>
<input type="date">
</div>

<div class="travellers-box" onclick="toggleTravellers()">
<span id="travellerSummary">1 Adult ▼</span>
</div>

<div class="travellers-menu" id="travellersMenu">
<label>Adults</label>
<input type="number" id="adults" value="1" min="1" onchange="updateTravellers()">

<label>Children 2-18</label>
<input type="number" id="children" value="0" min="0" onchange="updateTravellers()">

<label>Infants 0-2</label>
<input type="number" id="infants" value="0" min="0" onchange="updateTravellers()">
</div>

<button onclick="showResults()">Search Flights</button>

</div>
</section>

<div class="results" id="results">
<h2>Available Flights</h2>

<div class="result-card">
<h3>Saudia</h3>
<p>Jeddah → Cairo</p>
<p>Economy: $220</p>
<p>Business: $390</p>
<p>First: $680</p>
<a href="https://www.saudia.com" target="_blank">Book Direct</a>
</div>

<div class="result-card">
<h3>Flynas</h3>
<p>Jeddah → Cairo</p>
<p>Economy: $235</p>
<p>Business: $410</p>
<a href="https://www.flynas.com" target="_blank">Book Direct</a>
</div>

<div class="result-card">
<h3>EgyptAir</h3>
<p>Jeddah → Cairo</p>
<p>Economy: $240</p>
<p>Business: $430</p>
<a href="https://www.egyptair.com" target="_blank">Book Direct</a>
</div>
</div>

<footer>© 2026 SIMPAVIS</footer>

<script>
function showResults(){
document.getElementById("results").style.display="block";
document.getElementById("results").scrollIntoView({behavior:"smooth"});
}

function toggleReturn(){
const selected=document.querySelector('input[name="trip"]:checked');
document.getElementById("returnBox").style.display =
selected.parentElement.innerText.includes("One Way") ? "none" : "block";
}

function toggleTravellers(){
const menu=document.getElementById("travellersMenu");
menu.style.display = menu.style.display==="block" ? "none" : "block";
}

function updateTravellers(){
const adults=parseInt(document.getElementById("adults").value)||0;
const children=parseInt(document.getElementById("children").value)||0;
const infants=parseInt(document.getElementById("infants").value)||0;

let text=adults+" Adult";
if(children>0) text+=", "+children+" Child";
if(infants>0) text+=", "+infants+" Infant";

document.getElementById("travellerSummary").innerText=text+" ▼";
}

toggleReturn();
updateTravellers();
</script>

</body>
</html>
